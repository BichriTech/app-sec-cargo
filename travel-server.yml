server:
  port: 2802

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    password: passerapasici
    url: jdbc:mysql://localhost:3306/travel_serv_db
    username: root
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    show-sql: true

management:
  endpoint:
    health:
      show-details: always
  endpoints:
    web:
      exposure:
        include: '*'

eureka:
  client:
    fetch-registry: true
    register-with-eureka: true
    service-url:
      defaultZone: http://localhost:1654/eureka/